# Project information
site_name: Nobius
site_author: Pierre Tharreau, Louis Manestar
site_description: >-
  Nobius, a set of utilities which generate and manage large amounts of
  Mobius content.

# Git repo information
repo_url: https://github.com/mvreeuwijk/Nobius
repo_name: Nobius

# Page Tree
nav:
  - Welcome!: index.md
  - Quickstart Guide: quickstart.md
  - About:
      - List of Features: "About/features.md"
  - Usage:
      - export_mobius.py: "Usage/export_mobius.md"
      - preview_html.py: "Usage/preview_html.md"
      - export_pdf.py: "Usage/export_pdf.md"
      - import_mobius.py: "Usage/import_mobius.md"
      - export_mobius_batch.py: "Usage/export_mobius_batch.md"
      - Testing: "Usage/testing.md"
  - Sheet Files:
      - Sheet File Structure: "SheetFiles/SheetFileStructure.md"
      - SheetInfo.json: "SheetFiles/SheetInfo.md"
      - Field Reference: "SheetFiles/FieldReference.md"
      - Question files: "SheetFiles/Questions.md"
      - Parts: "SheetFiles/Parts.md"
  - Response areas:
      - Vanilla:
          - Document Upload: "ResponseAreas/Vanilla/document_upload.md"
          - List: "ResponseAreas/Vanilla/list.md"
          - Maple Graded: "ResponseAreas/Vanilla/maple.md"
          - Multiple Choice: "ResponseAreas/Vanilla/multiple_choice.md"
          - True False: "ResponseAreas/Vanilla/true_false.md"
          - Numeric: "ResponseAreas/Vanilla/numeric.md"
      - Advanced:
          - HTML: "ResponseAreas/Advanced/html.md"
          - Matrix: "ResponseAreas/Advanced/matrix.md"
          - Custom: "ResponseAreas/Advanced/custom.md"
  - Customization and Resources:
      - Configuration: "CustomizationAndResources/Configuration.md"
      - Course Module Package: "CustomizationAndResources/CourseModulePackage.md"
      - QuestionJavascript: "CustomizationAndResources/QuestionJavascript.md"
      - Templates and Jinja: "CustomizationAndResources/TemplatesAndJinja.md"
      - Round-Trip Invariants: "CustomizationAndResources/RoundTripInvariants.md"
  - Addons/Features:
      - Future additions/changes: "AddonsAndFeatures/FutureAdditions.md"

# Configuration
theme:
  name: material
  features:
    - navigation.instant
    - navigation.top
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/eye-outline
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: red
      accent: red
      toggle:
        icon: material/eye
        name: Switch to light mode

# Extensions
markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - def_list
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
